services:
  svbridge:
    build: .
    ports:
      - "${PORT:-8086}:8086"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./${SA_FILE:-sa.json}:/app/sa.json:ro
      - ./adc.json:/app/adc.json:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
